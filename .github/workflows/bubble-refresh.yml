name: AI Bubble index refresh

# The AI Bubble Index (aibubblemonitor.com mirror) updates ~daily and is
# independent of the stock market — so it must refresh 7 days a week, NOT on
# the weekday-only universe cadence. It was previously bundled into
# universe-refresh ("35 13,17,21 * * 1-5"), which froze the index every
# weekend. Now every 6 hours, every day.
on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bubble-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch AI bubble index
        run: python fetch_bubble_index.py

      - name: Commit bubble_index.json if it changed
        run: |
          git config user.name "santro-bubble-bot"
          git config user.email "actions@users.noreply.github.com"
          git add bubble_index.json
          if ! git diff --cached --quiet; then
            git commit -m "bubble index refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in $(seq 1 6); do
              git pull --rebase -X theirs origin main && git push && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 6 + 3))
            done
          fi
