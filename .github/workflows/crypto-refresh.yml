name: Crypto refresh (CoinMarketCap)

# Top 20 by cap from TWO CMC categories: AI & Big Data (200-coin pull, 2
# credits) + AI Agents (100-coin pull, 1 credit) = 3 credits/run. The
# endpoint's default order isn't cap, so we over-pull and sort ourselves.
# Every 15 minutes, 24/7 ≈ 288 credits/day against the free tier's ~333/day.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crypto-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch crypto quotes
        run: python fetch_crypto.py
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}

      - name: Commit crypto.json if it changed
        run: |
          git config user.name "santro-crypto-bot"
          git config user.email "actions@users.noreply.github.com"
          git add crypto.json
          if ! git diff --cached --quiet; then
            git commit -m "crypto refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X theirs origin main
            git push
          fi
