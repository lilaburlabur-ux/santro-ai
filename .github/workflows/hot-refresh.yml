name: Hot tickers refresh

# Quantitative hot-tickers scan every 15 min during market hours.
on:
  schedule:
    - cron: "*/15 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hot-refresh
  cancel-in-progress: false

jobs:
  hot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Scan for hot tickers
        run: python update_hot.py

      - name: Commit and publish
        run: |
          git config user.name "santro-hot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add hot_tickers.json
          if ! git diff --cached --quiet; then
            git commit -m "hot tickers $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X theirs origin main
            git push
          fi
