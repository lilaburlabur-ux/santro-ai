name: Post-close research refresh

# Runs ~20 min after the US market close so every ticker's "Close" is the
# official last close. Two crons cover summer (close 20:00 UTC) and winter
# (close 21:00 UTC); the extra summer run is a harmless no-op refresh.
on:
  schedule:
    - cron: "20 20 * * 1-5"
    - cron: "20 21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: post-close-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Regenerate research (dated closes, cards, signed reports)
        run: python research.py

      - name: Refresh quotes snapshot too
        run: python fetch.py

      - name: Commit and publish
        run: |
          git config user.name "santro-research-bot"
          git config user.email "actions@users.noreply.github.com"
          git add research/ data.json
          if ! git diff --cached --quiet; then
            git commit -m "post-close research $(date -u +'%Y-%m-%d')"
            for i in $(seq 1 6); do
              git pull --rebase -X theirs origin main && git push && break
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 6 + 3))
            done
          fi
