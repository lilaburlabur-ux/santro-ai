name: Pulse (cloud dispatcher)

# Self-sustaining cloud scheduler — replaces the Mac crontab dispatch layer.
# Each run loops ~55 minutes, dispatching the refresh workflows on their
# cadences, then hands over to the next pulse run. GitHub's own (lazy) cron
# only restarts the chain if it ever dies. No local machine involved.
#
# Cadences (UTC): quotes 5 min + hot 15 min + news 20 min during the extended
# US session (8-23h + 0h, Mon-Fri); crypto 15 min around the clock incl.
# weekends; universe 3x/day ~13:35/17:35/21:35; post-close research ~20:20
# and ~21:20 (summer/winter close).

on:
  schedule:
    - cron: "7,37 * * * *"   # chain restarter only — concurrency dedupes
  workflow_dispatch:

permissions: {}

concurrency:
  group: pulse
  cancel-in-progress: true

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      R: lilaburlabur-ux/santro-ai
    steps:
      - name: Dispatch loop (11 ticks x 5 min)
        run: |
          for i in $(seq 0 10); do
            dow=$(date -u +%u)
            h=$((10#$(date -u +%H)))
            m=$((10#$(date -u +%M)))
            market=0
            if [ "$dow" -le 5 ]; then
              if [ "$h" -ge 8 ] || [ "$h" -eq 0 ]; then market=1; fi
            fi

            if [ "$market" -eq 1 ]; then
              gh workflow run refresh-data.yml -R "$R" || true
            fi
            if [ $((i % 3)) -eq 0 ]; then
              gh workflow run crypto-refresh.yml -R "$R" || true
              if [ "$market" -eq 1 ]; then
                gh workflow run hot-refresh.yml -R "$R" || true
              fi
            fi
            if [ $((i % 4)) -eq 0 ] && [ "$market" -eq 1 ]; then
              gh workflow run news-refresh.yml -R "$R" || true
            fi
            # universe + ecosystem + bubble index, 3x/day (10-min windows;
            # a duplicate dispatch inside a window is harmless/idempotent)
            if [ "$dow" -le 5 ] && [ "$m" -ge 30 ] && [ "$m" -lt 40 ]; then
              case "$h" in 13|17|21) gh workflow run universe-refresh.yml -R "$R" || true;; esac
            fi
            # post-close research (~20 min after the US close, both DST cases)
            if [ "$dow" -le 5 ] && [ "$m" -ge 15 ] && [ "$m" -lt 25 ]; then
              case "$h" in 20|21) gh workflow run post-close-research.yml -R "$R" || true;; esac
            fi

            echo "tick $i done ($(date -u +%H:%M)) market=$market"
            if [ "$i" -lt 10 ]; then sleep 300; fi
          done

      - name: Hand over to the next pulse
        if: always()
        run: gh workflow run pulse.yml -R "$R" || true
