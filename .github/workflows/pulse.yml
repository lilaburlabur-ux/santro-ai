name: Pulse (cloud dispatcher)

# Self-sustaining cloud scheduler. GitHub's native scheduled crons are too lazy
# for this site's 5-min cadence (they skip for hours at a time), so each pulse
# run loops ~55 minutes dispatching the refresh workflows on their cadences,
# then hands over to the next run. The "7,37" cron only re-seeds the chain if
# it ever dies. No local machine involved. (The per-workflow schedule: blocks
# remain as a lazy backup, but pulse is the reliable trigger.)
on:
  schedule:
    - cron: "7,37 * * * *"   # chain restarter only — concurrency dedupes
  workflow_dispatch:

permissions: {}

concurrency:
  group: pulse
  cancel-in-progress: true

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      R: lilaburlabur-ux/santro-ai
    steps:
      - name: Dispatch loop (11 ticks x 5 min)
        run: |
          for i in $(seq 0 10); do
            dow=$(date -u +%u); h=$((10#$(date -u +%H))); m=$((10#$(date -u +%M)))
            market=0
            if [ "$dow" -le 5 ] && { [ "$h" -ge 8 ] || [ "$h" -eq 0 ]; }; then market=1; fi

            # tape/quotes (data.json carries BTC, a 24/7 asset): every 5 min
            # in-market, every 15 min off-market.
            if [ "$market" -eq 1 ] || [ $((i % 3)) -eq 0 ]; then
              gh workflow run refresh-data.yml -R "$R" || true
            fi
            # crypto 24/7 ~15 min; hot tickers + takeaways in-market ~15 min
            if [ $((i % 3)) -eq 0 ]; then
              gh workflow run crypto-refresh.yml -R "$R" || true
              if [ "$market" -eq 1 ]; then gh workflow run hot-refresh.yml -R "$R" || true; fi
            fi
            # news 24/7 ~20 min
            if [ $((i % 4)) -eq 0 ]; then
              gh workflow run news-refresh.yml -R "$R" || true
            fi
            # AI bubble index — source updates daily ~00:02 UTC; dispatch a few
            # times a day (idempotent, commits only if it changed).
            if [ "$i" -eq 0 ] && { [ "$h" -eq 1 ] || [ "$h" -eq 9 ] || [ "$h" -eq 17 ]; }; then
              gh workflow run bubble-refresh.yml -R "$R" || true
            fi
            # universe + ecosystem + OG + IPOs, ~3x/day weekdays (10-min windows;
            # a duplicate dispatch inside a window is harmless/idempotent)
            if [ "$dow" -le 5 ] && [ "$m" -ge 30 ] && [ "$m" -lt 40 ]; then
              case "$h" in 13|17|21) gh workflow run universe-refresh.yml -R "$R" || true;; esac
            fi
            # post-close research (~20 min after the US close, both DST cases)
            if [ "$dow" -le 5 ] && [ "$m" -ge 15 ] && [ "$m" -lt 25 ]; then
              case "$h" in 20|21) gh workflow run post-close-research.yml -R "$R" || true;; esac
            fi

            echo "tick $i done ($(date -u +%H:%M)) market=$market"
            if [ "$i" -lt 10 ]; then sleep 300; fi
          done

      - name: Hand over to the next pulse
        if: always()
        run: gh workflow run pulse.yml -R "$R" || true
