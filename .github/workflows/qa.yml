# ds_v2 + site QA gate — runs only when code (not bot data) changes
name: qa
on:
  push:
    branches: [main]
    paths: ["**.css", "**.js", "**.html", "**.py", "package.json", ".stylelintrc.json"]
  pull_request:
    paths: ["**.css", "**.js", "**.html", "**.py", "package.json", ".stylelintrc.json"]
jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm run lint:styles
      - run: npm run audit:colors
      - run: node ci/audit-colors.mjs --self-test
      - run: node qa_stress.js
