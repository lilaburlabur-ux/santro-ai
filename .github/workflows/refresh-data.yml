name: Refresh market data

# Every 5 minutes across the FULL extended session: premarket open 4:00 ET
# (8 UTC) through after-hours close 20:00 ET (0 UTC), Mon-Fri.
# Refreshes the watchlist/tape (fetch.py) AND patches quotes for every
# displayed ticker — AI Universe + NVIDIA Ecosystem (update_quotes.py).
on:
  schedule:
    - cron: "*/5 8-23 * * 1-5"   # every 5 min across the extended US session
    - cron: "*/15 * * * *"        # 24/7 15-min floor so BTC in the tape stays live
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch fresh market data
        run: python fetch.py

      - name: Patch quotes for all displayed tickers
        run: python update_quotes.py

      - name: Fetch DeItaone SPCX squawk (Telegram mirror)
        run: python fetch_tweets.py || true

      - name: Commit data files if they changed
        run: |
          git config user.name "santro-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json universe.json ecosystem.json tweets.json
          if git diff --cached --quiet; then
            echo "no data changes this cycle"; exit 0
          fi
          git commit -m "data refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          # Several bots push to main every few minutes. A single push loses the
          # race when another bot pushes between our rebase and our push
          # (non-fast-forward) and the run goes red. Retry rebase (-X theirs: our
          # data wins) + push with jittered backoff until it lands.
          for i in $(seq 1 6); do
            if git pull --rebase -X theirs origin main && git push; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "attempt $i lost the race — retrying"
            git rebase --abort 2>/dev/null || true
            sleep $((RANDOM % 6 + 3))
          done
          echo "::error::push failed after 6 attempts"; exit 1
