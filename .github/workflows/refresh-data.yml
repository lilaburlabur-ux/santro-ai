name: Refresh market data

# Every 5 minutes during US market hours (13:00-21:55 UTC covers
# summer and winter time), Mon-Fri. Manual trigger always available.
on:
  schedule:
    - cron: "*/5 13-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch fresh market data
        run: python fetch.py
        
      - name: Commit data.json if it changed
        run: |
          git config user.name "santro-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json

          if ! git diff --cached --quiet; then
          git commit -m "data refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
          fi
