name: AI Universe refresh

# The universe bubble map refreshes on a 4-hour cycle per universe/SPEC.md:
# open, midday, and close-ish on US trading days. 83 tickers ≈ 1 min run.
# Also rebuilds the NVIDIA Ecosystem basket (30 names) on the same cycle.
on:
  schedule:
    - cron: "35 13,17,21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: universe-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pillow

      - name: Refresh universe quotes
        run: python update_universe.py

      - name: Refresh NVIDIA Ecosystem
        run: python update_ecosystem.py

      - name: Refresh AI Bubble Index (attributed mirror)
        run: python fetch_bubble_index.py || true

      - name: Render OG preview image (today's movers)
        run: python make_og.py || true

      - name: Refresh AI IPOs
        run: python update_ipos.py || true

      - name: Commit and publish
        run: |
          git config user.name "santro-universe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add universe.json ecosystem.json bubble_index.json assets/og-map.png assets/og-crypto.png ipos.json
          if ! git diff --cached --quiet; then
            git commit -m "universe refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase -X theirs origin main
            git push
          fi
