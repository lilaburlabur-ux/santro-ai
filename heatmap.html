<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Sector Heatmap</title>

<!-- ECharts: the charting library that draws the treemap. Loaded from a CDN. -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0b0e11; color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; padding: 16px 20px 8px;
  }
  h1 { margin: 0; font-size: 20px; letter-spacing: .2px; }
  h1 .dot { color: #16a34a; }
  .sub { color: #8a929b; font-size: 12.5px; }
  .controls { display: flex; align-items: center; gap: 16px; }
  .legend { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #8a929b; }
  .legend .bar {
    width: 120px; height: 10px; border-radius: 2px;
    background: linear-gradient(to right, rgb(214,48,49), rgb(38,42,46), rgb(22,163,74));
  }
  #reload {
    background: #1b2128; color: #e6e6e6; border: 1px solid #2a323b;
    border-radius: 6px; padding: 7px 12px; font-size: 13px; cursor: pointer;
  }
  #reload:hover { background: #232b34; }
  .asof { padding: 0 20px 10px; color: #6c757d; font-size: 12px; }
  #chart { width: 100%; height: 62vh; min-height: 360px; }
  /* details panel */
  .details { padding: 16px 20px 28px; border-top: 1px solid #161b21; }
  .d-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .d-sym { font-size: 24px; font-weight: 700; }
  .d-name { color: #8a929b; font-size: 14px; }
  .d-pct { font-size: 18px; font-weight: 700; margin-left: auto; }
  .d-pct.up { color: #16a34a; } .d-pct.down { color: #ef4444; }
  .d-stats { color: #aab2bb; font-size: 13px; margin: 8px 0 16px; }
  .d-stats b { color: #e6e6e6; }
  .d-news-title { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: #6c757d; margin-bottom: 8px; }
  ul.d-news { list-style: none; margin: 0; padding: 0; }
  ul.d-news li { padding: 8px 0; border-bottom: 1px solid #161b21; }
  ul.d-news a { color: #cbd5e1; text-decoration: none; font-size: 14px; }
  ul.d-news a:hover { color: #fff; text-decoration: underline; }
  .d-meta { display: block; color: #6c757d; font-size: 11.5px; margin-top: 3px; }
</style>
</head>
<body>
  <header>
    <div>
      <h1><span class="dot">●</span> AI Sector Heatmap</h1>
      <div class="sub">Top <span id="count">10</span> by market cap · tile size = market cap · color = today's % change</div>
    </div>
    <div class="controls">
      <div class="legend"><span>−3%</span><span class="bar"></span><span>+3%</span></div>
      <button id="reload" title="Reloads the latest saved data. To pull fresh prices, re-run fetch.py.">↻ Reload</button>
    </div>
  </header>

  <div class="asof" id="asof">Loading…</div>
  <div id="chart"></div>
  <div class="details" id="details"></div>

<script>
// ---- small formatting helpers ------------------------------------------------
const fmtPct = x => (x >= 0 ? "+" : "") + x.toFixed(2) + "%";
function fmtCap(n) {
  if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
  if (n >= 1e9)  return "$" + (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6)  return "$" + (n / 1e6).toFixed(1) + "M";
  return "$" + Math.round(n);
}
function timeAgo(iso) {
  if (!iso) return "";
  const mins = Math.round((Date.now() - new Date(iso)) / 60000);
  if (isNaN(mins)) return "";
  if (mins < 60) return mins + "m ago";
  const h = Math.round(mins / 60);
  if (h < 24) return h + "h ago";
  return Math.round(h / 24) + "d ago";
}
// red (down) -> grey (flat) -> green (up), saturated at +/-3%
function colorFor(pct) {
  const grey = [38, 42, 46], green = [22, 163, 74], red = [214, 48, 49];
  const t = Math.min(Math.abs(pct) / 3, 1);
  const to = pct >= 0 ? green : red;
  const c = grey.map((g, i) => Math.round(g + (to[i] - g) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

// ---- state + chart -----------------------------------------------------------
let chart = echarts.init(document.getElementById("chart"), null, { renderer: "canvas" });
let stocks = [];
let selectedSymbol = null;

function render() {
  const maxCap = Math.max(...stocks.map(s => s.market_cap));
  const fontFor = cap => Math.round(12 + 30 * Math.sqrt(cap / maxCap)); // big company -> big text

  const data = stocks.map(s => ({
    name: s.symbol,
    value: s.market_cap,
    stock: s,                                   // stash full record for tooltip/click
    itemStyle: { color: colorFor(s.change_pct) },
    label: { fontSize: fontFor(s.market_cap), lineHeight: Math.round(fontFor(s.market_cap) * 1.2) },
  }));

  chart.setOption({
    backgroundColor: "transparent",
    tooltip: {
      borderColor: "#2a323b", backgroundColor: "#15191e",
      textStyle: { color: "#e6e6e6", fontSize: 12 },
      formatter: p => {
        const s = p.data.stock;
        const col = s.change_pct >= 0 ? "#16a34a" : "#ef4444";
        return `<b>${s.symbol}</b> · ${s.name}<br/>`
             + `<span style="color:${col}">${fmtPct(s.change_pct)}</span> &nbsp; $${s.price.toFixed(2)}<br/>`
             + `Market cap ${fmtCap(s.market_cap)}<br/>`
             + `<span style="color:#6c757d">click tile for headlines ↓</span>`;
      },
    },
    series: [{
      type: "treemap", roam: false, nodeClick: false, animationDuration: 350,
      breadcrumb: { show: false },
      width: "100%", height: "100%", top: 0, left: 0, right: 0, bottom: 0,
      itemStyle: { borderColor: "#0b0e11", borderWidth: 2, gapWidth: 2 },
      label: {
        show: true, color: "#fff", fontWeight: 600, overflow: "truncate",
        formatter: p => `${p.data.name}\n${fmtPct(p.data.stock.change_pct)}`,
      },
      data,
    }],
  });
}

function showDetails(s) {
  selectedSymbol = s.symbol;
  const cls = s.change_pct >= 0 ? "up" : "down";
  let html = `
    <div class="d-head">
      <span class="d-sym">${s.symbol}</span>
      <span class="d-name">${s.name}</span>
      <span class="d-pct ${cls}">${fmtPct(s.change_pct)}</span>
    </div>
    <div class="d-stats">
      Price <b>$${s.price.toFixed(2)}</b> &nbsp;·&nbsp;
      Prev close $${(s.previous_close ?? 0).toFixed(2)} &nbsp;·&nbsp;
      Market cap <b>${fmtCap(s.market_cap)}</b>
    </div>
    <div class="d-news-title">Latest headlines</div>`;
  if (s.headlines && s.headlines.length) {
    html += '<ul class="d-news">' + s.headlines.map(h => `
      <li>
        <a href="${h.url}" target="_blank" rel="noopener">${h.title}</a>
        <span class="d-meta">${h.publisher}${h.published ? " · " + timeAgo(h.published) : ""}</span>
      </li>`).join("") + "</ul>";
  } else {
    html += '<div class="d-meta">No headlines available right now.</div>';
  }
  document.getElementById("details").innerHTML = html;
}

chart.on("click", p => { if (p.data && p.data.stock) showDetails(p.data.stock); });
window.addEventListener("resize", () => chart.resize());

// ---- load data.json (and re-load periodically) -------------------------------
async function loadData() {
  try {
    const res = await fetch("data.json?t=" + Date.now());   // cache-bust
    const d = await res.json();
    stocks = d.stocks || [];
    document.getElementById("count").textContent = stocks.length;
    document.getElementById("asof").textContent = "As of " + d.as_of_local + " — " + d.delay_note;
    render();
    const sel = stocks.find(s => s.symbol === selectedSymbol) || stocks[0];
    if (sel) showDetails(sel);
  } catch (e) {
    document.getElementById("asof").textContent =
      "Could not load data.json — run fetch.py first, and open this page through the local server.";
    console.error(e);
  }
}

document.getElementById("reload").addEventListener("click", loadData);
loadData();
setInterval(loadData, 60000);   // auto-reload saved data every 60s
</script>
</body>
</html>
