<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>stoxheatmap.ai — Hot Tickers (reference implementation)</title>
<style>
  body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; background: #0d1117; color: #e6edf3; margin: 0; padding: 20px; }
  h2 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #9aa4b2; margin-bottom: 14px; }
  .card { display: flex; align-items: flex-start; gap: 14px; background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .tk { font-weight: 700; font-size: 16px; min-width: 64px; }
  .chip { font-size: 13px; font-weight: 600; padding: 2px 10px; border-radius: 999px; white-space: nowrap; }
  .up   { background: rgba(46,160,67,.15);  color: #56d364; }
  .down { background: rgba(218,54,51,.15);  color: #f85149; }
  .nonews { background: rgba(240,136,62,.15); color: #f0883e; }
  .why { font-size: 14px; line-height: 1.45; color: #c9d1d9; flex: 1; }
  .meta { font-size: 11.5px; color: #8b949e; margin-top: 4px; }
  .meta a { color: #58a6ff; text-decoration: none; }
  .fire { font-size: 12px; color: #f0883e; min-width: 44px; text-align: right; }
  .disclaimer { font-size: 11px; color: #6e7681; margin-top: 14px; }
</style>
</head>
<body>
<h2>🔥 Hot tickers</h2>
<div class="sub" id="asof"></div>
<div id="cards"></div>
<div class="disclaimer" id="disc"></div>
<script>
fetch("data.json").then(r => r.json()).then(d => {
  document.getElementById("asof").textContent =
    "Updated " + new Date(d.meta.as_of).toLocaleString() + " · refreshes every " + d.meta.refresh_cycle_hours + "h · hot = attention, not direction";
  document.getElementById("disc").textContent = d.meta.disclaimer;
  document.getElementById("cards").innerHTML = d.hot_tickers.map(t => {
    const cls = t.catalyst_type === "no_news_mover" ? "nonews" : (t.move_pct > 0 ? "up" : "down");
    const sign = t.move_pct > 0 ? "+" : "";
    const src = t.source_url ? ` · <a href="${t.source_url}" target="_blank" rel="noopener">source</a>` : "";
    return `<div class="card">
      <div class="tk">${t.ticker}<div class="meta">$${t.price.toLocaleString()}</div></div>
      <span class="chip ${cls}">${sign}${t.move_pct.toFixed(1)}%</span>
      <div class="why">${t.why}
        <div class="meta">${t.company} · vol ${(t.volume/1e6).toFixed(1)}M (${t.volume_vs_avg} avg)${src}</div>
      </div>
      <div class="fire">🔥 ${t.heat_score}</div>
    </div>`;
  }).join("");
});
</script>
</body>
</html>
